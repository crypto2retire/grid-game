name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grid
          POSTGRES_PASSWORD: gridpassword
          POSTGRES_DB: gridgame_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd apps/api && npx prisma generate
      - run: cd apps/api && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://grid:gridpassword@localhost:5432/gridgame_test
      - run: npm run test
        env:
          DATABASE_URL: postgresql://grid:gridpassword@localhost:5432/gridgame_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci-only
          NODE_ENV: test
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

      # Deploy to Railway using CLI with account token
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          echo "Deploying to Railway..."
          echo "Using Project Access Token for authentication..."
          # Project tokens use Project-Access-Token header, not Authorization Bearer
          # The CLI should pick this up from RAILWAY_TOKEN env var
          export RAILWAY_TOKEN="fe224778-7649-442e-a795-044236078f7e"
          railway up --service grid-web --detach --yes --verbose 2>&1
        timeout-minutes: 15
        env:
          RAILWAY_TOKEN: fe224778-7649-442e-a795-044236078f7e

      # Deploy to Render (if RENDER_API_KEY is set)
      - name: Deploy to Render
        if: env.RENDER_API_KEY != ''
        run: |
          curl -X POST https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
