name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install --include=dev
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grid
          POSTGRES_PASSWORD: gridpassword
          POSTGRES_DB: gridgame_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://grid:gridpassword@127.0.0.1:5432/gridgame_test
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-test-jwt-secret-at-least-32-characters
      NODE_ENV: test
      REQUIRED_DYN_BALANCE: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install --include=dev
      - run: cd apps/api && npx prisma generate
      - run: cd apps/api && npx prisma migrate deploy
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://grid:gridpassword@127.0.0.1:5432/gridgame_build
      JWT_SECRET: ci-build-jwt-secret-at-least-32-characters
      REQUIRED_DYN_BALANCE: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install --include=dev
      - run: cd apps/api && npx prisma generate
      - run: npm run build

  render-deploy-note:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - run: echo "Render auto-deploys GRID from GitHub pushes; GitHub Actions only validates lint, tests, and build."
