name: Railway Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  deploy:
    name: Deploy GRID to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          echo "Deploying from root Dockerfile..."
          echo "Logging in with provided token..."
          railway login --token "6f0fe356-0123-44b0-bcca-c02845228455" --verbose > /tmp/railway-deploy.log 2>&1
          echo "Login completed. Checking status..."
          railway status >> /tmp/railway-deploy.log 2>&1
          echo "Linked to project. Deploying..."
          railway up --service grid-web --detach --yes --verbose >> /tmp/railway-deploy.log 2>&1
          cat /tmp/railway-deploy.log
        timeout-minutes: 15

      - name: Upload Deploy Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: railway-deploy-logs
          path: /tmp/railway-deploy.log

      - name: Health Check
        run: |
          echo "Waiting for deployment..."
          sleep 45
          SERVICE_URL=$(railway service domain --json | jq -r '.url // empty')
          if [ -z "$SERVICE_URL" ]; then
            echo "Could not get service URL, trying default..."
            SERVICE_URL=$(railway service domain --json 2>/dev/null | jq -r '.url // empty')
          fi
          echo "Service URL: $SERVICE_URL"
          curl -f "$SERVICE_URL/health" || echo "Health check failed - service may still be starting"
        timeout-minutes: 5
        continue-on-error: true

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Deployment failed. Common issues:"
          echo "1. Invalid Railway token - regenerate at https://railway.app/account/tokens"
          echo "2. Service not linked - run 'railway link' locally first"
          echo "3. Database not connected - add PostgreSQL service in Railway dashboard"
          echo "4. Redis not connected - add Redis service in Railway dashboard"
          echo "5. Build errors - check Dockerfile and build logs in Railway dashboard"
          exit 1
