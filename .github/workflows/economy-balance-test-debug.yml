name: Economy Balance Test Debug

on:
  pull_request:
    paths:
      - 'apps/api/src/modules/economy-balance/**'
      - '.github/workflows/economy-balance-test-debug.yml'

jobs:
  capture-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grid
          POSTGRES_PASSWORD: gridpassword
          POSTGRES_DB: gridgame_debug
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://grid:gridpassword@127.0.0.1:5432/gridgame_debug
      JWT_SECRET: debug-jwt-secret-at-least-32-characters
      REQUIRED_DYN_BALANCE: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --include=dev
      - run: cd apps/api && npx prisma generate && npx prisma migrate deploy
      - name: Capture Jest output
        run: |
          set +e
          npm run test > test.log 2>&1
          echo $? > test.exit
      - uses: actions/upload-artifact@v4
        with:
          name: economy-balance-test-log
          path: |
            test.log
            test.exit
          retention-days: 7
      - run: test "$(cat test.exit)" = "0"
