services:
  - type: web
    name: grid-game
    runtime: docker
    repo: https://github.com/crypto2retire/grid-game
    branch: main
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://grid-game.onrender.com
      - key: VITE_API_URL
        value: /api
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DAILY_SALT
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: grid-db
          property: connectionString
    healthCheckPath: /api/health
    plan: starter
    numInstances: 1

databases:
  - name: grid-db
    databaseName: gridgame
    user: grid
    plan: starter
    ipAllowList: []
